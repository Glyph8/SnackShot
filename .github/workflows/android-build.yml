name: Android Build & Release

# 언제 이 작업을 실행할지 결정합니다. (예: main 브랜치에 push 할 때)
on:
  push:
    branches: [ "main" ] 

jobs:
  build:
    runs-on: ubuntu-latest # GitHub이 제공하는 무료 리눅스 서버를 빌립니다.

    steps:
      - name: 1. 내 소스 코드 가져오기
        uses: actions/checkout@v3

      - name: 2. Node.js 설치 (React Native 구동용)
        uses: actions/setup-node@v3
        with:
          node-version: '18' # 사용 중인 노드 버전에 맞게 수정하세요.

      - name: 3. 패키지(라이브러리) 설치
        run: npm install

      - name: 4. Java JDK 설치 (안드로이드 빌드용)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17' # 최신 RN은 보통 17을 씁니다.

      - name: 5. 안드로이드 APK 빌드하기 (명령어 실행)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 6. 완성된 APK 파일을 GitHub에 업로드하기
        uses: actions/upload-artifact@v3
        with:
          name: app-debug-apk # 다운로드될 파일의 이름
          path: android/app/build/outputs/apk/debug/app-debug.apk