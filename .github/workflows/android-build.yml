name: Android Build & Release

# 언제 이 작업을 실행할지 결정합니다. (예: main 브랜치에 push 할 때)
on:
  push:
    branches: [ "main" ] 

jobs:
  build:
    runs-on: ubuntu-latest # GitHub이 제공하는 무료 리눅스 서버를 빌립니다.

    steps:
      - name: 1. 내 소스 코드 가져오기
        uses: actions/checkout@v3

      - name: 2. Node.js 설치 (React Native 구동용)
        uses: actions/setup-node@v3
        with:
          node-version: '26' 

      - name: 3. 패키지(라이브러리) 설치
        run: npm install

      - name: 4. Java JDK 설치 (안드로이드 빌드용)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17' # 최신 RN은 보통 17을 씁니다.

      - name: 4-5. Expo 플러그인 빌드 및 안드로이드 폴더 생성
        run: |
          # package.json에 정의된 커스텀 플러그인 빌드를 먼저 실행합니다.
          npm run build:plugin
          # 이어서 안드로이드 플랫폼 전용 폴더를 생성합니다.
          npx expo prebuild --platform android

      - name: 5. 안드로이드 APK 빌드 (Release 모드) 및 이름 변경
        run: |
          cd android
          chmod +x gradlew
          # Debug 대신 Release 명령어를 사용합니다!
          ./gradlew assembleRelease
          
          # 만들어진 폴더 위치가 debug에서 release로 바뀝니다.
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/SnackShot.apk

      - name: 6. 완성된 실사용 APK 파일을 GitHub에 업로드하기
        uses: actions/upload-artifact@v4
        with:
          name: SnackShot
          # 업로드할 경로도 release로 맞춰줍니다.
          path: android/app/build/outputs/apk/release/SnackShot.apk